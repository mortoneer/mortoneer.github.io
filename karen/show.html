<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen Show Runner</title>
    <link rel="stylesheet" href="./show.css">
</head>
<body>
    <header>
        <div class="title">Karen Show Runner</div>
        <div class="connection-panel">
            <span id="status" class="status-dot"></span>
            <label>MAC: <input type="text" id="macAddress" value="XX:XX:XX:XX:XX:XX" readonly></label>
            <button id="btnConnect" class="btn-connect">Connect</button>
            <button id="btnDisconnect" class="btn-disconnect">Disconnect</button>
        </div>
    </header>

    <div id="sceneDisplay" class="scene-display">
        <div class="scene-card prev">
            <div class="scene-label">PREVIOUS</div>
            <div class="scene-name"></div>
        </div>
        <div class="scene-card current">
            <div class="scene-number"></div>
            <div class="scene-name"></div>
        </div>
        <div class="scene-card next">
            <div class="scene-label">NEXT</div>
            <div class="scene-name"></div>
        </div>
    </div>

    <div id="sceneList" class="scene-list"></div>

    <div class="controls">
        <div class="hint">← PREV | SPACE/→ NEXT</div>
    </div>

    <script type="module" src="./show.mjs"></script>
</body>
</html>
